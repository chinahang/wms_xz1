<div class="p-4">
    <form id="inventory-filter-form" method="GET" action="{{ url_for('sales.inventory_list') }}"
          hx-get="{{ url_for('sales.inventory_list') }}" hx-target="#inventory-modal-body" hx-swap="innerHTML"
          class="flex gap-2 mb-4 flex-wrap">
        <input type="hidden" name="dept_id" value="{{ request.args.get('dept_id', '') }}">
        <input type="text" name="card_no" placeholder="卡号" value="{{ request.args.get('card_no', '') }}"
               class="px-2 py-1.5 border border-slate-400 rounded text-sm w-28">
        <select name="product_name" class="px-2 py-1.5 border border-slate-400 rounded text-sm">
            <option value="">品名</option>
            {% for pn in product_names %}
            <option value="{{ pn.name }}" {{ 'selected' if request.args.get('product_name') == pn.name }}>{{ pn.name }}</option>
            {% endfor %}
        </select>
        <select name="brand" class="px-2 py-1.5 border border-slate-400 rounded text-sm">
            <option value="">牌号</option>
            {% for b in brands %}
            <option value="{{ b.name }}" {{ 'selected' if request.args.get('brand') == b.name }}>{{ b.name }}</option>
            {% endfor %}
        </select>
        <select name="origin" class="px-2 py-1.5 border border-slate-400 rounded text-sm">
            <option value="">产地</option>
            {% for o in origins %}
            <option value="{{ o.name }}" {{ 'selected' if request.args.get('origin') == o.name }}>{{ o.name }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="px-3 py-1.5 bg-blue-500 text-white rounded text-sm">查询</button>
    </form>

    <div class="max-h-80 overflow-y-auto">
        <table class="w-full text-sm">
            <thead class="sticky top-0 bg-white">
                <tr class="border-b text-slate-500">
                    <th class="py-1 px-2 text-left w-8"><input type="checkbox" id="select-all-inv" onchange="toggleAllInventory(this)"></th>
                    <th class="py-1 px-2 text-left">卡号</th>
                    <th class="py-1 px-2 text-left">品名</th>
                    <th class="py-1 px-2 text-left">牌号</th>
                    <th class="py-1 px-2 text-left">产地</th>
                    <th class="py-1 px-2 text-left">规格</th>
                    <th class="py-1 px-2 text-right">件数</th>
                    <th class="py-1 px-2 text-right">吨位</th>
                    <th class="py-1 px-2 text-left">仓库</th>
                </tr>
            </thead>
            <tbody>
                {% for inv in results %}
                <tr class="border-b hover:bg-slate-50 inv-row" data-card-no="{{ inv.card_no }}" data-product-name="{{ inv.product_name }}" data-brand="{{ inv.brand }}" data-origin="{{ inv.origin }}" data-spec="{{ inv.spec }}" data-qty="{{ inv.qty }}" data-weight="{{ inv.weight }}" data-warehouse="{{ inv.warehouse.name if inv.warehouse else '' }}">
                    <td class="py-1 px-2"><input type="checkbox" class="inv-checkbox" value="{{ inv.card_no }}"></td>
                    <td class="py-1 px-2">{{ inv.card_no }}</td>
                    <td class="py-1 px-2">{{ inv.product_name }}</td>
                    <td class="py-1 px-2">{{ inv.brand }}</td>
                    <td class="py-1 px-2">{{ inv.origin }}</td>
                    <td class="py-1 px-2">{{ inv.spec }}</td>
                    <td class="py-1 px-2 text-right">{{ inv.qty }}</td>
                    <td class="py-1 px-2 text-right">{{ inv.weight }}</td>
                    <td class="py-1 px-2 text-xs">{{ inv.warehouse.name if inv.warehouse else '-' }}</td>
                </tr>
                {% endfor %}
                {% if not results %}
                <tr><td colspan="9" class="py-4 text-center text-slate-400">无库存记录</td></tr>
                {% endif %}
            </tbody>
        </table>
    </div>

    <div class="mt-4 flex justify-end gap-2">
        <button type="button" onclick="closeInventoryModal()" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg text-sm">取消</button>
        <button type="button" onclick="addSelectedToSales()" class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm">确认选择</button>
    </div>
</div>
